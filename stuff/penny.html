<html><head><meta charset="UTF-8"><style>
body{background-color:silver}
h1,p{text-align:center;font-family:monospace;}
h1{font-size:32;margin:24px}
div{position:relative;margin:auto;width:624;height:624;background-color:white}
canvas,table{position:absolute}
table{border-collapse:collapse;left:24px;top:24px}
td{width:95px;height:96px;padding:0;border:1px solid black}
p{font-size:16}
</style><title>Pennygurítás</title></head><body>
<h1>Pennygurítás szimulátor</h1><div>
<table><script>
for(let y=0;y<6;y++){
  document.write('<tr>');
  for(let x=0;x<6;x++)
    document.write('<td />');
  document.write('</tr>');
}
</script></table>
<canvas id="canvas" width="624" height="624" />
</div><p>Az oldal minden újratöltésekor az érme egy véletlenszerű helyre esik.<br>Ha nem érinti a rácsvonalat, akkor nyert.</p><script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
ctx.beginPath();
ctx.arc(24+Math.random()*576,24+Math.random()*576,24,0,2*Math.PI);
ctx.fillStyle='gold';
ctx.fill();
ctx.lineWidth=1;
ctx.strokeStyle='black';
ctx.stroke();
</script></body></html>
