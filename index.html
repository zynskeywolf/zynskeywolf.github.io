<html><head><link rel='stylesheet' href='style.css'><title>Trancwolve's website thing</title></head>
<body><img src='header.svg'>
<div id="menu">
<a onclick="menuclick(this);" id="home" class="active">Home</a>
<a onclick="menuclick(this);" id="lynx">Links</a>
<a onclick="menuclick(this);" id="musicc">Musicc</a>
<a onclick="menuclick(this);" id="projects">Other projects</a>
<a onclick="menuclick(this);" id="lore">Lore</a>
</div>
<div id=content></div>
<script>
if(window.location.hash)
document.getElementById(window.location.hash.substring(1)).click();
else
document.getElementsByClassName('active')[0].click();
function menuclick(e) {
document.getElementsByClassName('active')[0].classList.remove("active");
e.classList.add("active");
var xhttp=new XMLHttpRequest();
xhttp.onreadystatechange=function()
{
if (this.readyState==4)
document.getElementById('content').innerHTML=this.responseText;
}
xhttp.open('GET','content/'+e.id);
xhttp.send();
return;
}
</script></body></html>
